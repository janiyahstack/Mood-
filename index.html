!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">

    <title>success tracker</title>
</head>
<body>
    <h1>How are you today?</h1>
    <div class="emoji">
        <button class="happy" data-mood="happy" data-color="#ffae42">😊</button>
        <button class="sad" data-mood="sad" data-color="#29465b">😞</button>
        <button class="numb" data-mood="numb" data-color="#000000">😑</button>
        <button class="angry" data-mood="angry" data-color="#FF3939">😡</button>
        <button class="tired" data-mood="tired" data-color="#E5D2C4">🥱</button>
        <button class="excited" data-mood="excited" data-color="#FA799D">😃</button>
        <button class="calm" data-mood="calm" data-color="#86a96f">😌</button>
    </div>
    <button class="review">
    <select>
        <option>
            <li> WEEKLY REVIEW</li>
     </option>
     <option>
        <li>Monthly review</li>
     </option>
    </select>
    </button>
    <canvas id="moodChart"></canvas>
</body>
<script src= script.js> script.js</script>
</html>
